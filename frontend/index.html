<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente DBP</title>
    <link rel="icon" href="../Export_Avatar/avatar.icon.png" type="image/x-icon">
    <!-- Tailwind CSS para diseño rápido y responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para el botón de audio -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { margin: 0; background-color: #ffffff; overflow: hidden;}
        
        /* Barra de desplazamiento personalizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.05); }
        ::-webkit-scrollbar-thumb { background: #17243d; border-radius: 10px; }
        
        /* Animaciones para Procesando (Rojo) */
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000; }
            50% { box-shadow: 0 0 2px #ff0000, 0 0 5px #ff0000; }
        }
        .status-processing { animation: pulse-red 2s infinite; background-color: #ff0000 !important; }
        
        /* Cursor de tipeo blanco */
        .typing-cursor::after {
            content: '█';
            animation: blink 1s step-start infinite;
            color: #ffffff;
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Efecto de voz activa (ondas en Azul/Primario) */
        @keyframes speaking-pulse {
            0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 5px #17243d; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 10px #17243d; }
            100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 5px #17243d; }
        }
        .is-speaking .status-dot { animation: speaking-pulse 0.3s infinite alternate; background-color: #17243d !important; }

        /* ==========================================
           ESTILOS PARA EL CONTENEDOR DE GODOT
           ========================================== */
        #godot-container {
            position: absolute;
            bottom: 250px; 
            left: 80px;   
            width: 350px; 
            height: 350px;
            z-index: 5;
            /* Permite hacer clic "a través" del área transparente del canvas */
            pointer-events: none; 
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
            outline: none; 
        }

        #godot-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #17243d;
            font-weight: bold;
            font-size: 14px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body class="relative font-sans antialiased text-[#17243d] h-screen w-screen flex flex-col md:flex-row">

    
    <!-- Contenedor del Avatar 2D (Godot) -->
    <div id="godot-container">
        <!-- El lienzo transparente de Godot -->
        <canvas id="canvas"></canvas>
        <!-- Mensaje de carga mientras se descargan los binarios web (.wasm/.pck) -->
        <div id="godot-loading">Iniciando Avatar...<br><span id="loading-progress">0%</span></div>
    </div>

    <!-- Interfaz de Usuario (UI) superpuesta -->
    <div class="relative z-10 w-full md:w-1/3 max-w-md h-full ml-auto p-4 md:p-6 flex flex-col justify-end md:justify-center pointer-events-none">
        
        <!-- Panel de Chat -->
        <div class="bg-[#f3f4f6]/95 backdrop-blur-md border border-gray-200 rounded-2xl p-4 shadow-2xl shadow-black/10 pointer-events-auto flex flex-col h-[70vh] md:h-[80vh] transition-all">
            
            <!-- Cabecera del Asistente -->
            <div id="header-container" class="flex items-center justify-between border-b border-gray-200 pb-4 mb-4 transition-colors">
                <div class="flex items-center gap-3">
                    <div id="status-indicator" class="w-3 h-3 rounded-full bg-emerald-500 status-dot transition-colors duration-300"></div>
                    <div>
                        <h2 class="text-xl font-bold text-[#17243d] tracking-wider m-0 leading-tight">Asistente-DBP</h2>
                        <p id="status-text" class="text-xs text-gray-500 font-mono">En línea - Modo CPU</p>
                    </div>
                </div>
                <button id="audio-toggle" class="p-2 rounded-full hover:bg-gray-200 transition-colors text-[#17243d]" title="Activar/Desactivar Voz">
                    <i data-lucide="volume-2" id="audio-icon"></i>
                </button>
            </div>

            <!-- Historial de Chat -->
            <div id="chat-history" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2 flex flex-col">
                <div class="flex justify-start">
                    <div class="bg-[#17243d] text-white rounded-2xl rounded-tl-none px-4 py-3 text-sm shadow-sm max-w-[90%]">
                        Saludos. Soy Asistente-DBP. Estoy aquí para ayudarte con cualquier duda relacionada con el DBP.
                    </div>
                </div>
            </div>

            <!-- Input de Usuario -->
            <div class="relative flex items-center mt-auto">
                <input id="user-input" type="text" 
                    class="w-full bg-white border border-gray-300 rounded-xl py-3 pl-4 pr-12 text-sm text-gray-900 focus:outline-none focus:border-[#17243d] focus:ring-1 focus:ring-[#17243d] transition-all placeholder-gray-400 shadow-sm"
                    placeholder="Escribe tu consulta aquí..." 
                    autocomplete="off">
                <button id="send-btn" class="absolute right-2 p-2 bg-[#17243d] hover:bg-[#20325c] text-white rounded-lg transition-colors flex items-center justify-center">
                    <svg id="icon-send" class="w-4 h-4 block" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                    <svg id="icon-stop" class="w-4 h-4 hidden fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- MUY IMPORTANTE: Asegúrate de que avatar.js esté en la misma carpeta o ruta correcta -->
    <script src="../Export_Avatar/avatar.js"></script>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        // ==========================================
        // 1. INICIALIZACIÓN DE GODOT ENGINE
        // ==========================================
        const loadingProgress = document.getElementById('loading-progress');
        const loadingScreen = document.getElementById('godot-loading');
        
        // Creamos la instancia del motor de Godot basado en avatar.js
        const engine = new Engine({
            "args": [],
            "canvasResizePolicy": 2, // Permite que el canvas llene su contenedor padre (#godot-container)
            "executable": "../Export_Avatar/avatar",  // El nombre base de los archivos .wasm / .pck
            "experimentalVK": false,
            "focusCanvas": false,
            "gdextensionLibs": []
        });

        // Iniciamos el engine y manejamos la barra de carga de los binarios
        engine.startGame({
            'onProgress': function (current, total) {
                if (total > 0) {
                    const percent = Math.floor((current / total) * 100);
                    loadingProgress.innerText = percent + "%";
                }
            }
        }).then(() => {
            // Aseguramos que la pantalla de carga se oculte cuando la promesa de inicio se resuelve exitosamente.
            loadingScreen.style.display = 'none';
            console.log("Motor Godot cargado e iniciado con éxito.");

            // --- CORRECCIÓN DE TÍTULO E ÍCONO (Solución Rápida) ---
            
            // 1. Forzamos el título de vuelta al original
            document.title = "Asistente DBP";
            
            // 2. Removemos TODOS los íconos (incluyendo el inyectado por Godot)
            const icons = document.querySelectorAll("link[rel~='icon']");
            icons.forEach(icon => icon.remove());
            
            // 3. Reinyectamos tu ícono personalizado de forma estricta
            const myIcon = document.createElement('link');
            myIcon.rel = 'icon';
            myIcon.href = '../Export_Avatar/avatar.icon.png';
            myIcon.type = 'image/x-icon';
            document.head.appendChild(myIcon);
            
            // ------------------------------------------------------

        }).catch(e => {
            console.error("Error al cargar Godot Engine:", e);
            loadingScreen.innerText = "Error cargando Avatar";
            loadingScreen.style.color = "red";
        });

        // ==========================================
        // PUENTE DE COMUNICACIÓN JS -> GODOT
        // ==========================================
        // Variable global donde Godot inyectará su función
        window.godotReceiveState = null;

        function setAvatarState(state) {
            console.log("Enviando estado a Godot:", state);
            if (window.godotReceiveState) {
                window.godotReceiveState(state); // Llama a Godot
            }
        }

        // ==========================================
        // 2. CONFIGURACIÓN DE VOZ (TEXT-TO-SPEECH)
        // ==========================================
        let isAudioEnabled = true;
        let ttsVoice = null;
        const synth = window.speechSynthesis;
        const audioToggleBtn = document.getElementById('audio-toggle');
        const headerContainer = document.getElementById('header-container');

        let activeBubble = null; 
        window.utterances = []; 

        function loadVoices() {
            const voices = synth.getVoices();
            ttsVoice = voices.find(v => v.lang.includes('es') && (v.name.includes('Google') || v.name.includes('Microsoft'))) || 
                       voices.find(v => v.lang.includes('es')) || 
                       voices[0];
        }
        
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        audioToggleBtn.addEventListener('click', () => {
            isAudioEnabled = !isAudioEnabled;
            if (isAudioEnabled) {
                audioToggleBtn.innerHTML = '<i data-lucide="volume-2" class="text-[#17243d]"></i>';
                const unlockMsg = new SpeechSynthesisUtterance('');
                synth.speak(unlockMsg);
            } else {
                audioToggleBtn.innerHTML = '<i data-lucide="volume-x" class="text-gray-400"></i>';
                synth.cancel();
            }
            lucide.createIcons();
        });

        function speakSentence(text, bubble) {
            if (!isAudioEnabled || !text.trim()) return;
            
            const utterance = new SpeechSynthesisUtterance(text);
            window.utterances.push(utterance); 
            if (ttsVoice) utterance.voice = ttsVoice;
            utterance.pitch = 0.9;
            utterance.rate = 1.05;
            
            utterance.onstart = () => {
                headerContainer.classList.add('is-speaking');
                displayQueue += text;
                setAvatarState("SPEAKING"); // <-- Avatar a Hablando
            };

            utterance.onend = () => {
                window.utterances = window.utterances.filter(u => u !== utterance);
                if (!synth.speaking && !synth.pending) {
                    headerContainer.classList.remove('is-speaking');
                    setAvatarState("IDLE"); // <-- Avatar a Reposo
                }
            };
            
            synth.speak(utterance);
        }

        // ==========================================
        // 3. LÓGICA DE INTERACCIÓN Y STREAMING
        // ==========================================
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const iconSend = document.getElementById('icon-send');
        const iconStop = document.getElementById('icon-stop');
        const statusIndicator = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');

        let currentAbortController = null;
        let displayQueue = ""; 
        let typingInterval = null; 
        let isProcessing = false;

        function addUserMessage(text) {
            const wrapper = document.createElement('div'); wrapper.className = 'flex justify-end';
            const bubble = document.createElement('div');
            bubble.className = 'bg-white text-gray-900 border border-gray-100 rounded-2xl rounded-tr-none px-4 py-3 text-sm max-w-[85%] shadow-md';
            bubble.textContent = text; wrapper.appendChild(bubble); chatHistory.appendChild(wrapper);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function createBotMessageBubble() {
            const wrapper = document.createElement('div'); wrapper.className = 'flex justify-start';
            const bubble = document.createElement('div');
            bubble.className = 'bg-[#17243d] text-white rounded-2xl rounded-tl-none px-4 py-3 text-sm max-w-[85%] shadow-sm typing-cursor min-h-[44px]';
            wrapper.appendChild(bubble); chatHistory.appendChild(wrapper); chatHistory.scrollTop = chatHistory.scrollHeight;
            return bubble;
        }

        async function sendMessage() {
            if (isProcessing) {
                if (currentAbortController) currentAbortController.abort();
                synth.cancel();
                displayQueue = ""; 
                if (typingInterval) clearInterval(typingInterval);
                headerContainer.classList.remove('is-speaking'); 
                if (activeBubble) activeBubble.classList.remove('typing-cursor');
                setAvatarState("IDLE"); // <-- Avatar a Reposo si aborta
                return;
            }

            const text = userInput.value.trim();
            if (!text) return;

            if (isAudioEnabled) synth.cancel();

            addUserMessage(text);
            userInput.value = '';
            
            isProcessing = true;
            statusIndicator.classList.remove('bg-emerald-500');
            statusIndicator.classList.add('status-processing');
            statusText.textContent = 'Procesando (Pensando)...';
            statusText.classList.replace('text-gray-500', 'text-[#ff0000]');

            sendBtn.classList.replace('bg-[#17243d]', 'bg-[#ff0000]');
            sendBtn.classList.replace('hover:bg-[#20325c]', 'hover:bg-[#cc0000]');
            iconSend.classList.replace('block', 'hidden');
            iconStop.classList.replace('hidden', 'block');

            setAvatarState("THINKING"); // <-- Avatar a Pensando

            activeBubble = createBotMessageBubble();
            let speechBuffer = "";
            displayQueue = ""; 

            if (typingInterval) clearInterval(typingInterval);
            const typeSpeedVoiceOn = 50;  
            const typeSpeedVoiceOff = 20; 
            const typeSpeed = isAudioEnabled ? typeSpeedVoiceOn : typeSpeedVoiceOff;
            
            typingInterval = setInterval(() => {
                if (displayQueue.length > 0) {
                    let charsToType = 1;
                    if (!isAudioEnabled) {
                        charsToType = displayQueue.length > 60 ? 3 : (displayQueue.length > 30 ? 2 : 1);
                    } else {
                        charsToType = displayQueue.length > 100 ? 2 : 1; 
                    }
                    activeBubble.textContent += displayQueue.substring(0, charsToType);
                    displayQueue = displayQueue.substring(charsToType);
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                } else if (!isProcessing) {
                    if (!isAudioEnabled || (!synth.speaking && !synth.pending)) {
                        activeBubble.classList.remove('typing-cursor');
                        clearInterval(typingInterval);
                        typingInterval = null;
                    }
                }
            }, typeSpeed);

            currentAbortController = new AbortController();

            try {
                // LLAMADA AL BACKEND REAL (asegúrate de que FastAPI esté corriendo en 8000)
                const response = await fetch('http://localhost:8000/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pregunta: text, session_id: "sesion_default" }),
                    signal: currentAbortController.signal 
                });

                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                
                statusText.textContent = 'Procesando...';

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let done = false;

                while (!done) {
                    const { value, done: readerDone } = await reader.read();
                    done = readerDone;
                    
                    if (value) {
                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n');
                        
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const dataStr = line.replace('data: ', '').trim();
                                if (dataStr === '[DONE]') {
                                    done = true;
                                    if (isAudioEnabled && speechBuffer.trim()) {
                                        speakSentence(speechBuffer, activeBubble);
                                    } else if (!isAudioEnabled && speechBuffer.trim()){
                                        displayQueue += speechBuffer;
                                    }
                                    break;
                                }
                                if (dataStr) {
                                    try {
                                        const dataJson = JSON.parse(dataStr);
                                        if (dataJson.respuesta) {
                                            const token = dataJson.respuesta;
                                            if (isAudioEnabled) {
                                                speechBuffer += token;
                                                const match = speechBuffer.match(/([^.!?]+[.!?]+)(\s|$)/);
                                                if (match) {
                                                    speakSentence(match[1], activeBubble);
                                                    speechBuffer = speechBuffer.slice(match[0].length); 
                                                }
                                            } else {
                                                displayQueue += token;
                                            }
                                        }
                                    } catch (e) {
                                        console.warn("Error parseando fragmento JSON:", e);
                                    }
                                }
                            }
                        }
                    }
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log("Petición de streaming cancelada por el usuario.");
                    displayQueue = ""; 
                    activeBubble.textContent += "  [Respuesta cancelada]";
                } else {
                    console.error("Error de conexión:", error);
                    activeBubble.textContent += " [⚠️ Error de conexión]";
                }
            } finally {
                isProcessing = false;
                currentAbortController = null;
                
                statusIndicator.classList.remove('status-processing');
                statusIndicator.classList.add('bg-emerald-500');
                statusText.textContent = 'En línea - Modo CPU';
                statusText.classList.replace('text-[#ff0000]', 'text-gray-500');

                if (isAudioEnabled && !synth.speaking && !synth.pending) {
                     headerContainer.classList.remove('is-speaking');
                     setAvatarState("IDLE"); // <-- Avatar a Reposo (con audio)
                } else if (!isAudioEnabled) {
                     setAvatarState("IDLE"); // <-- Avatar a Reposo (sin audio)
                }

                sendBtn.classList.replace('bg-[#ff0000]', 'bg-[#17243d]');
                sendBtn.classList.replace('hover:bg-[#cc0000]', 'hover:bg-[#20325c]');
                iconStop.classList.replace('block', 'hidden');
                iconSend.classList.replace('hidden', 'block');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter' && !isProcessing) sendMessage(); 
        });
    </script>
</body>
</html>
