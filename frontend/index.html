<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS-7 | Asistente Virtual 3D</title>
    <!-- Tailwind CSS para diseño rápido y responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js para renderizado 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Lucide Icons para el botón de audio -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #05050a; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        
        /* Barra de desplazamiento personalizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 10px; }
        
        /* Animaciones */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px #22d3ee, 0 0 10px #22d3ee; }
            50% { box-shadow: 0 0 2px #22d3ee, 0 0 5px #22d3ee; }
        }
        .status-dot { animation: pulse-glow 2s infinite; }
        
        .typing-cursor::after {
            content: '█';
            animation: blink 1s step-start infinite;
            color: #06b6d4;
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Efecto de voz activa (ondas) */
        @keyframes speaking-pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .is-speaking .status-dot { animation: speaking-pulse 0.3s infinite alternate; background-color: #a855f7; box-shadow: 0 0 10px #a855f7; }
    </style>
</head>
<body class="relative font-sans antialiased text-white h-screen w-screen flex flex-col md:flex-row">

    <!-- Contenedor del Avatar 3D -->
    <div id="canvas-container"></div>

    <!-- Interfaz de Usuario (UI) superpuesta -->
    <div class="relative z-10 w-full md:w-1/3 max-w-md h-full ml-auto p-4 md:p-6 flex flex-col justify-end md:justify-center pointer-events-none">
        
        <!-- Panel de Chat -->
        <div class="bg-gray-900/70 backdrop-blur-md border border-cyan-500/30 rounded-2xl p-4 shadow-2xl shadow-cyan-900/20 pointer-events-auto flex flex-col h-[70vh] md:h-[80vh] transition-all">
            
            <!-- Cabecera del Asistente -->
            <div id="header-container" class="flex items-center justify-between border-b border-cyan-500/30 pb-4 mb-4 transition-colors">
                <div class="flex items-center gap-3">
                    <div id="status-indicator" class="w-3 h-3 bg-cyan-400 rounded-full status-dot transition-colors duration-300"></div>
                    <div>
                        <h2 class="text-xl font-bold text-cyan-400 tracking-wider m-0 leading-tight">NEXUS-7</h2>
                        <p id="status-text" class="text-xs text-gray-400 font-mono">En línea - Modo CPU</p>
                    </div>
                </div>
                <!-- Botón de Audio Toggle -->
                <button id="audio-toggle" class="p-2 rounded-full hover:bg-gray-800 transition-colors text-gray-400 hover:text-cyan-400" title="Activar/Desactivar Voz">
                    <i data-lucide="volume-x" id="audio-icon"></i>
                </button>
            </div>

            <!-- Historial de Chat -->
            <div id="chat-history" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2 flex flex-col">
                <div class="flex justify-start">
                    <div class="bg-cyan-950/60 text-cyan-50 rounded-2xl rounded-tl-none px-4 py-3 text-sm border border-cyan-500/30 shadow-sm max-w-[90%]">
                        Saludos. Soy NEXUS-7. Puedes activar mi módulo de voz usando el icono del altavoz en la parte superior.
                    </div>
                </div>
            </div>

            <!-- Input de Usuario -->
            <div class="relative flex items-center mt-auto">
                <input id="user-input" type="text" 
                    class="w-full bg-gray-800/80 border border-gray-600 rounded-xl py-3 pl-4 pr-12 text-sm text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-all placeholder-gray-500"
                    placeholder="Escribe tu consulta aquí..." 
                    autocomplete="off">
                <button id="send-btn" class="absolute right-2 p-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg transition-colors flex items-center justify-center">
                    <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        // ==========================================
        // 1. CONFIGURACIÓN DE VOZ (TEXT-TO-SPEECH)
        // ==========================================
        let isAudioEnabled = false;
        let ttsVoice = null;
        const synth = window.speechSynthesis;
        const audioToggleBtn = document.getElementById('audio-toggle');
        const audioIcon = document.getElementById('audio-icon');
        const headerContainer = document.getElementById('header-container');

        // Cargar voces disponibles (el navegador las carga asíncronamente)
        function loadVoices() {
            const voices = synth.getVoices();
            // Buscar una voz en español (preferiblemente que suene a IA/Asistente)
            ttsVoice = voices.find(v => v.lang.includes('es') && (v.name.includes('Google') || v.name.includes('Microsoft'))) || 
                       voices.find(v => v.lang.includes('es')) || 
                       voices[0];
        }
        
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        // Toggle para activar/desactivar audio
        audioToggleBtn.addEventListener('click', () => {
            isAudioEnabled = !isAudioEnabled;
            if (isAudioEnabled) {
                audioToggleBtn.innerHTML = '<i data-lucide="volume-2" class="text-cyan-400"></i>';
                // Pequeño truco para desbloquear el motor de audio en navegadores estrictos
                const unlockMsg = new SpeechSynthesisUtterance('');
                synth.speak(unlockMsg);
            } else {
                audioToggleBtn.innerHTML = '<i data-lucide="volume-x" class="text-gray-400"></i>';
                synth.cancel(); // Detener si estaba hablando
            }
            lucide.createIcons();
        });

        // Función para hablar una oración
        function speakSentence(text) {
            if (!isAudioEnabled || !text.trim()) return;
            
            const utterance = new SpeechSynthesisUtterance(text.trim());
            if (ttsVoice) utterance.voice = ttsVoice;
            
            // Ajustes para que suene más como un asistente robótico/futurista
            utterance.pitch = 0.9; // Tono ligeramente más grave
            utterance.rate = 1.05; // Ligeramente más rápido
            
            // Efectos visuales de hablando
            utterance.onstart = () => headerContainer.classList.add('is-speaking');
            utterance.onend = () => headerContainer.classList.remove('is-speaking');
            
            synth.speak(utterance);
        }

        // ==========================================
        // 2. CONFIGURACIÓN DEL ENTORNO 3D (THREE.JS)
        // ==========================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const material = new THREE.MeshStandardMaterial({ 
            color: 0x00ffff, wireframe: true, emissive: 0x00aaff, emissiveIntensity: 0.6, transparent: true, opacity: 0.9
        });
        
        // --- NUEVO AVATAR: MASCOTA DBP (Estructura Geométrica) ---
        const nexusAvatar = new THREE.Group();

        // Cuerpo
        const bodyGeo = new THREE.BoxGeometry(1.5, 1.2, 2.2);
        const body = new THREE.Mesh(bodyGeo, material);
        nexusAvatar.add(body);

        // Cabeza
        const headGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const head = new THREE.Mesh(headGeo, material);
        head.position.set(0, 1, 1);
        nexusAvatar.add(head);

        // Orejas
        const earGeo = new THREE.ConeGeometry(0.3, 0.8, 4);
        const earL = new THREE.Mesh(earGeo, material); earL.position.set(-0.4, 1.8, 1);
        const earR = new THREE.Mesh(earGeo, material); earR.position.set(0.4, 1.8, 1);
        nexusAvatar.add(earL); nexusAvatar.add(earR);

        // Cola
        const tailGeo = new THREE.CylinderGeometry(0.1, 0.1, 1.2);
        const tail = new THREE.Mesh(tailGeo, material);
        tail.position.set(0, 0.6, -1.2);
        tail.rotation.x = Math.PI / 4;
        nexusAvatar.add(tail);

        // Patas
        const legGeo = new THREE.BoxGeometry(0.4, 1, 0.4);
        const legFL = new THREE.Mesh(legGeo, material); legFL.position.set(-0.5, -0.8, 0.7);
        const legFR = new THREE.Mesh(legGeo, material); legFR.position.set(0.5, -0.8, 0.7);
        const legBL = new THREE.Mesh(legGeo, material); legBL.position.set(-0.5, -0.8, -0.7);
        const legBR = new THREE.Mesh(legGeo, material); legBR.position.set(0.5, -0.8, -0.7);
        nexusAvatar.add(legFL); nexusAvatar.add(legFR); nexusAvatar.add(legBL); nexusAvatar.add(legBR);

        scene.add(nexusAvatar);

        /* // =================================================================
        // CÓDIGO FUTURO PARA CARGAR EL MODELO 3D REAL (.GLTF o .GLB) DEL DBP
        // =================================================================
        // 1. Añade esto en el <head> de tu HTML: 
        // <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"> (AQUI CERRAR SCRIPT)
        //
        // 2. Comenta o borra todo el bloque de "NUEVO AVATAR: MASCOTA DBP" de arriba.
        //
        // 3. Descomenta este bloque:
        // const loader = new THREE.GLTFLoader();
        // let nexusAvatar = new THREE.Group();
        // scene.add(nexusAvatar);
        // loader.load('ruta/a/tu/mascota_dbp.glb', function(gltf) {
        //     scene.remove(nexusAvatar); 
        //     nexusAvatar = gltf.scene;
        //     nexusAvatar.traverse((child) => {
        //         if (child.isMesh) child.material = material; // Aplica el estilo holográfico
        //     });
        //     scene.add(nexusAvatar);
        // });
        */

        const ambientLight = new THREE.AmbientLight(0x202040); scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00ffff, 2, 50);
        pointLight.position.set(5, 5, 5); scene.add(pointLight);

        camera.position.z = 8;
        camera.position.y = 1; // Subimos un poco la cámara para ver mejor a la mascota
        
        function adjustLayout() {
            if (window.innerWidth > 768) { nexusAvatar.position.x = -3; } 
            else { nexusAvatar.position.x = 0; nexusAvatar.position.y = 1.5; }
        }
        adjustLayout();

        let isProcessing = false;
        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            // Movimientos idle de la mascota
            nexusAvatar.rotation.y = Math.sin(time * 0.5) * 0.3; // Mira suavemente de lado a lado
            nexusAvatar.position.y = Math.sin(time * 2) * 0.05; // Flota ligeramente
            tail.rotation.z = Math.sin(time * 10) * 0.2; // Mueve la cola suavemente

            if (isProcessing) {
                // Estado: Pensando
                tail.rotation.z = Math.sin(time * 25) * 0.5; // Mueve la cola rápido
                nexusAvatar.rotation.y += 0.05; // Da vueltas de emoción
                material.color.setHex(0xff8800); material.emissive.setHex(0xff5500); pointLight.color.setHex(0xff8800);
            } else if (headerContainer.classList.contains('is-speaking')) {
                // Estado: Hablando (Morado)
                head.rotation.x = Math.sin(time * 15) * 0.1; // Asiente con la cabeza al hablar
                material.color.setHex(0xa855f7); material.emissive.setHex(0x9333ea); pointLight.color.setHex(0xa855f7);
            } else {
                // Estado: Reposo
                head.rotation.x = 0;
                material.color.setHex(0x00ffff); material.emissive.setHex(0x00aaff); pointLight.color.setHex(0x00ffff);
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); adjustLayout();
        });

        // ==========================================
        // 3. LÓGICA DE INTERACCIÓN Y STREAMING
        // ==========================================
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusIndicator = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');

        function addUserMessage(text) {
            const wrapper = document.createElement('div'); wrapper.className = 'flex justify-end';
            const bubble = document.createElement('div');
            bubble.className = 'bg-cyan-600 text-white rounded-2xl rounded-tr-none px-4 py-3 text-sm max-w-[85%] shadow-md';
            bubble.textContent = text; wrapper.appendChild(bubble); chatHistory.appendChild(wrapper);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function createBotMessageBubble() {
            const wrapper = document.createElement('div'); wrapper.className = 'flex justify-start';
            const bubble = document.createElement('div');
            bubble.className = 'bg-cyan-950/60 text-cyan-50 rounded-2xl rounded-tl-none px-4 py-3 text-sm border border-cyan-500/30 max-w-[85%] shadow-sm typing-cursor min-h-[44px]';
            wrapper.appendChild(bubble); chatHistory.appendChild(wrapper); chatHistory.scrollTop = chatHistory.scrollHeight;
            return bubble;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isProcessing) return;

            // Detener cualquier voz anterior si el usuario interrumpe
            if (isAudioEnabled) synth.cancel();

            addUserMessage(text);
            userInput.value = '';
            
            isProcessing = true;
            statusIndicator.classList.replace('bg-cyan-400', 'bg-orange-500');
            statusText.textContent = 'Procesando (Pensando)...';
            statusText.classList.replace('text-gray-400', 'text-orange-400');

            const botBubble = createBotMessageBubble();
            let speechBuffer = ""; // Buffer para armar oraciones completas

            try {
                const response = await fetch('http://localhost:8000/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pregunta: text, session_id: "sesion_default" })
                });

                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                
                statusText.textContent = 'Procesando (Hablando)...';

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let done = false;

                while (!done) {
                    const { value, done: readerDone } = await reader.read();
                    done = readerDone;
                    
                    if (value) {
                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n');
                        
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const dataStr = line.replace('data: ', '').trim();
                                
                                if (dataStr === '[DONE]') {
                                    done = true;
                                    // Hablar lo que haya quedado en el buffer al final
                                    if (speechBuffer.trim()) {
                                        speakSentence(speechBuffer);
                                    }
                                    break;
                                }
                                
                                if (dataStr) {
                                    try {
                                        const dataJson = JSON.parse(dataStr);
                                        if (dataJson.respuesta) {
                                            const token = dataJson.respuesta;
                                            botBubble.textContent += token;
                                            speechBuffer += token;
                                            chatHistory.scrollTop = chatHistory.scrollHeight;

                                            // Expresión regular: Detectar fin de oración (punto, interrogación, exclamación seguido de espacio)
                                            // Esto permite hablar por oraciones mientras el LLM sigue generando la siguiente
                                            const match = speechBuffer.match(/([^.!?]+[.!?]+)(\s|$)/);
                                            if (match) {
                                                speakSentence(match[1]);
                                                speechBuffer = speechBuffer.slice(match[0].length); // Limpiar buffer procesado
                                            }
                                        }
                                    } catch (e) {
                                        console.warn("Error parseando fragmento JSON:", e);
                                    }
                                }
                            }
                        }
                    }
                }
            } catch (error) {
                console.error("Error de conexión:", error);
                botBubble.textContent += " [⚠️ Error de conexión]";
            } finally {
                isProcessing = false;
                botBubble.classList.remove('typing-cursor');
                statusIndicator.classList.replace('bg-orange-500', 'bg-cyan-400');
                statusText.textContent = 'En línea - Modo CPU';
                statusText.classList.replace('text-orange-400', 'text-gray-400');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
